<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* sRGB equivalents of accent.600 / accent.300 — an SVG favicon can't rely on oklch parsing. */
    :root { --c: #4046ef; }
    @media (prefers-color-scheme: dark) { :root { --c: #a0b5ff; } }
    circle { fill: none; stroke: var(--c); }
    text {
      fill: var(--c);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
    }
  </style>
  <circle cx="50" cy="50" r="47" stroke-width="3" opacity="0.4" />
  <circle cx="50" cy="50" r="39" stroke-width="3" />
  <text x="50" y="60.5" text-anchor="middle" font-size="30" letter-spacing="0.5">JWD</text>
</svg>
